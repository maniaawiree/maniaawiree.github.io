<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Mania Monet</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="layout">
            <div class="handle" data-h="1" title="Drag to resize"></div>
            <div class="handle" data-h="2" title="Drag to resize"></div>
            <div class="handle" data-h="3" title="Drag to resize"></div>
            <nav class="categories">
                <ul>
                    <li>
                        <button
                            class="cat"
                            data-id="drawings"
                            style="--pos: 18%"
                        >
                            Drawings</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button class="cat" data-id="poetry" style="--pos: 62%">
                            Poetry</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button
                            class="cat"
                            data-id="photography"
                            style="--pos: 34%"
                        >
                            Photography</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button class="cat" data-id="video" style="--pos: 78%">
                            Video</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button class="cat" data-id="digital" style="--pos: 8%">
                            Digital Work</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button
                            class="cat"
                            data-id="hardware"
                            style="--pos: 50%"
                        >
                            Hardware</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button class="cat" data-id="sound" style="--pos: 88%">
                            Sound</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                    <li>
                        <button
                            class="cat"
                            data-id="appearances"
                            style="--pos: 24%"
                        >
                            Appearances</button
                        ><span class="track"><span class="dot"></span><span class="shelf"></span></span>
                    </li>
                </ul>
            </nav>

            <section class="detail">
                <article id="artwork">
                    <img src="assets/example.png" alt="Example artwork" />
                    <h2 class="artwork-title">Untitled</h2>
                    <p class="artwork-description">
                        Select a category on the left.
                    </p>
                </article>
            </section>
        </main>

        <div class="size-bar">
            <div class="row">
                <label for="size-slider">target</label>
                <input
                    type="range"
                    id="size-slider"
                    min="10"
                    max="40"
                    step="1"
                    value="40"
                />
                <span class="val" id="size-target-val">10</span>
            </div>
            <div class="row">
                <label for="size-current">current</label>
                <input
                    type="range"
                    id="size-current"
                    min="10"
                    max="40"
                    step="0.01"
                    value="10"
                    disabled
                />
                <span class="val" id="size-current-val">10</span>
            </div>
            <div class="row">
                <label for="fps-slider">fps</label>
                <input
                    type="range"
                    id="fps-slider"
                    min="3"
                    max="7"
                    step="1"
                    value="5"
                />
                <span class="val" id="fps-val">5</span>
            </div>
            <div class="row">
                <label for="scale-slider">scale</label>
                <input
                    type="range"
                    id="scale-slider"
                    min="0"
                    max="1"
                    step="0.001"
                    value="0"
                />
                <span class="val" id="scale-val">0.00</span>
            </div>
            <div class="row">
                <button class="mode-btn" id="play-btn">play</button>
                <button class="mode-btn" data-pmode="autoplay">autoplay</button>
                <button class="mode-btn" data-pmode="manual">manual</button>
                <button class="mode-btn" data-pmode="record">record</button>
                <button class="mode-btn" id="copy-btn">copy</button>
                <button class="mode-btn" id="erase-btn">erase</button>
                <span class="val" id="env-info">no envelope</span>
            </div>
            <div class="row">
                <label>tracks</label>
                <span id="tracks-list"></span>
                <button class="mode-btn" id="add-track-btn">+ new</button>
                <button class="mode-btn" id="del-track-btn">delete</button>
            </div>
        </div>

        <script>
            const data = {
                drawings: { title: "Drawing / 01", desc: "Ink on paper." },
                poetry: { title: "Poem / 01", desc: "Three stanzas." },
                photography: { title: "Photograph / 01", desc: "35mm." },
                video: { title: "Video / 01", desc: "Loop. 12 seconds." },
                digital: {
                    title: "Digital Work / 01",
                    desc: "Generated, then hand-corrected.",
                },
                hardware: { title: "Hardware / 01", desc: "Modular setup." },
                sound: { title: "Sound / 01", desc: "Noise. One take." },
                appearances: { title: "Appearance / 01", desc: "Past event." },
            };
            const titleEl = document.querySelector(".artwork-title");
            const descEl = document.querySelector(".artwork-description");
            const layout = document.querySelector(".layout");
            const STORAGE_KEY = "mm.cols";
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
                if (saved) {
                    if (typeof saved.c1 === "number") layout.style.setProperty("--c1", saved.c1);
                    if (typeof saved.c2 === "number") layout.style.setProperty("--c2", saved.c2);
                    if (typeof saved.c3 === "number") layout.style.setProperty("--c3", saved.c3);
                }
            } catch (e) {}
            const colKey = (which) => `--c${which}`;
            let drag = null;
            document.querySelectorAll(".handle").forEach((h) => {
                h.addEventListener("mousedown", (e) => {
                    const styles = getComputedStyle(layout);
                    drag = {
                        which: h.dataset.h,
                        startX: e.clientX,
                        startVal: parseFloat(styles.getPropertyValue(colKey(h.dataset.h))),
                        total: layout.offsetWidth,
                    };
                    document.body.style.cursor = "col-resize";
                    document.body.style.userSelect = "none";
                    e.preventDefault();
                });
            });
            document.addEventListener("mousemove", (e) => {
                if (!drag) return;
                const dxPct = ((e.clientX - drag.startX) / drag.total) * 100;
                const v = Math.min(70, Math.max(5, drag.startVal + dxPct));
                layout.style.setProperty(colKey(drag.which), v);
            });
            document.addEventListener("mouseup", () => {
                if (!drag) return;
                drag = null;
                document.body.style.cursor = "";
                document.body.style.userSelect = "";
                const styles = getComputedStyle(layout);
                const c1 = parseFloat(styles.getPropertyValue("--c1"));
                const c2 = parseFloat(styles.getPropertyValue("--c2"));
                const c3 = parseFloat(styles.getPropertyValue("--c3"));
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ c1, c2, c3 }));
                } catch (e) {}
            });

            function makeBlob(baseR, state) {
                const stroke = 1.5;
                const pointsCount = 5 + Math.floor(Math.random() * 5);
                const startAngle = Math.random() * Math.PI * 2;
                const rotRad = ((Math.random() * 30 - 15) * Math.PI) / 180;
                const baseJitter = 0.40;
                const refR = 10;
                const s = computeScale();
                const scaleFactor = 1 - s + s * (refR / baseR);
                const jitter = Math.min(baseJitter, baseJitter * scaleFactor);
                const radii = Array.from({ length: pointsCount }, () =>
                    baseR * (1 - jitter + Math.random() * jitter * 2)
                );
                const cosR = Math.cos(rotRad), sinR = Math.sin(rotRad);
                const pts = [];
                for (let i = 0; i < pointsCount; i++) {
                    const a = startAngle + (i / pointsCount) * Math.PI * 2;
                    const r = radii[i];
                    const x0 = Math.cos(a) * r;
                    const y0 = Math.sin(a) * r;
                    pts.push([x0 * cosR - y0 * sinR, x0 * sinR + y0 * cosR]);
                }
                const n = pts.length;
                const ctrl = [];
                for (let i = 0; i < n; i++) {
                    const p0 = pts[(i - 1 + n) % n];
                    const p1 = pts[i];
                    const p2 = pts[(i + 1) % n];
                    const p3 = pts[(i + 2) % n];
                    ctrl.push([
                        [p1[0] + (p2[0] - p0[0]) / 6, p1[1] + (p2[1] - p0[1]) / 6],
                        [p2[0] - (p3[0] - p1[0]) / 6, p2[1] - (p3[1] - p1[1]) / 6],
                    ]);
                }
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                for (let i = 0; i < n; i++) {
                    const p1 = pts[i];
                    const p2 = pts[(i + 1) % n];
                    const [c1, c2] = ctrl[i];
                    for (let t = 0; t <= 24; t++) {
                        const u = t / 24, mu = 1 - u;
                        const x = mu * mu * mu * p1[0] + 3 * mu * mu * u * c1[0] + 3 * mu * u * u * c2[0] + u * u * u * p2[0];
                        const y = mu * mu * mu * p1[1] + 3 * mu * mu * u * c1[1] + 3 * mu * u * u * c2[1] + u * u * u * p2[1];
                        if (x < minX) minX = x;
                        if (y < minY) minY = y;
                        if (x > maxX) maxX = x;
                        if (y > maxY) maxY = y;
                    }
                }
                const pad = stroke / 2 + 0.5;
                minX -= pad; minY -= pad; maxX += pad; maxY += pad;
                const w = maxX - minX, h = maxY - minY;
                const offX = -minX, offY = -minY;
                let d = `M ${(pts[0][0] + offX).toFixed(2)} ${(pts[0][1] + offY).toFixed(2)}`;
                for (let i = 0; i < n; i++) {
                    const p2 = pts[(i + 1) % n];
                    const [c1, c2] = ctrl[i];
                    d += ` C ${(c1[0] + offX).toFixed(2)} ${(c1[1] + offY).toFixed(2)}, ${(c2[0] + offX).toFixed(2)} ${(c2[1] + offY).toFixed(2)}, ${(p2[0] + offX).toFixed(2)} ${(p2[1] + offY).toFixed(2)}`;
                }
                d += " Z";
                return `<svg width="${w.toFixed(2)}" height="${h.toFixed(2)}" viewBox="0 0 ${w.toFixed(2)} ${h.toFixed(2)}" style="display:block" xmlns="http://www.w3.org/2000/svg"><path d="${d}" fill="#ff2400" stroke="black" stroke-width="${stroke}" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
            }
            document.querySelectorAll(".dot").forEach((d) => {
                const li = d.closest("li");
                li.style.setProperty("--pos", `${Math.random() * 88 + 4}%`);
            });

            const SIZE_KEY = "mm.size.v2";
            const slider = document.getElementById("size-slider");
            const currentSlider = document.getElementById("size-current");
            const targetVal = document.getElementById("size-target-val");
            const currentVal = document.getElementById("size-current-val");
            const savedSize = parseFloat(localStorage.getItem(SIZE_KEY));
            if (!isNaN(savedSize)) slider.value = savedSize;
            targetVal.textContent = slider.value;
            let currentSize = parseFloat(slider.min);
            function syncCurrent() {
                currentSlider.value = currentSize;
                currentVal.textContent = currentSize.toFixed(0);
            }
            const ENVELOPE_KEY = "mm.envelope";
            const PMODE_KEY = "mm.pmode";
            const scaleSlider = document.getElementById("scale-slider");
            const TRACKS_KEY = "mm.tracks";
            const HARDCODED_ENVELOPE = [{"t":0,"v":0},{"t":1699,"v":0.024},{"t":1723,"v":0.025},{"t":1728,"v":0.026},{"t":1741,"v":0.027},{"t":1744,"v":0.028},{"t":1757,"v":0.029},{"t":1761,"v":0.03},{"t":1778,"v":0.031},{"t":1794,"v":0.032},{"t":1842,"v":0.033},{"t":1899,"v":0.034},{"t":2257,"v":0.035},{"t":2282,"v":0.036},{"t":2329,"v":0.037},{"t":2370,"v":0.038},{"t":2404,"v":0.039},{"t":2491,"v":0.04},{"t":2541,"v":0.041},{"t":2574,"v":0.042},{"t":2633,"v":0.043},{"t":2662,"v":0.044},{"t":2687,"v":0.045},{"t":2711,"v":0.046},{"t":2756,"v":0.047},{"t":2773,"v":0.048},{"t":2795,"v":0.049},{"t":2816,"v":0.05},{"t":2859,"v":0.051},{"t":2883,"v":0.052},{"t":2908,"v":0.053},{"t":2933,"v":0.054},{"t":2958,"v":0.055},{"t":3012,"v":0.056},{"t":3040,"v":0.057},{"t":3073,"v":0.058},{"t":3149,"v":0.059},{"t":3199,"v":0.06},{"t":3245,"v":0.061},{"t":3357,"v":0.062},{"t":3431,"v":0.063},{"t":6170,"v":0.064},{"t":6224,"v":0.065},{"t":6258,"v":0.066},{"t":6332,"v":0.067},{"t":6378,"v":0.068},{"t":6421,"v":0.069},{"t":6503,"v":0.07},{"t":6577,"v":0.071},{"t":6610,"v":0.072},{"t":6695,"v":0.073},{"t":6746,"v":0.074},{"t":6778,"v":0.075},{"t":6875,"v":0.076},{"t":6916,"v":0.077},{"t":6995,"v":0.078},{"t":7037,"v":0.079},{"t":7071,"v":0.08},{"t":7154,"v":0.081},{"t":7200,"v":0.082},{"t":7244,"v":0.083},{"t":7333,"v":0.084},{"t":7370,"v":0.085},{"t":7420,"v":0.086},{"t":7529,"v":0.087},{"t":7567,"v":0.088},{"t":7611,"v":0.089},{"t":7683,"v":0.09},{"t":7716,"v":0.091},{"t":7746,"v":0.092},{"t":7795,"v":0.093},{"t":7820,"v":0.094},{"t":7845,"v":0.095},{"t":7870,"v":0.096},{"t":7924,"v":0.097},{"t":7950,"v":0.098},{"t":7973,"v":0.099},{"t":7991,"v":0.1},{"t":8045,"v":0.101},{"t":8070,"v":0.102},{"t":8106,"v":0.103},{"t":8162,"v":0.104},{"t":8204,"v":0.105},{"t":8225,"v":0.106},{"t":8258,"v":0.107},{"t":8333,"v":0.108},{"t":8375,"v":0.109},{"t":8412,"v":0.11},{"t":8553,"v":0.111},{"t":8641,"v":0.112},{"t":11103,"v":0.113},{"t":11128,"v":0.114},{"t":11162,"v":0.115},{"t":11212,"v":0.116},{"t":11245,"v":0.117},{"t":11285,"v":0.118},{"t":11318,"v":0.119},{"t":11394,"v":0.12},{"t":11425,"v":0.121},{"t":11454,"v":0.122},{"t":11554,"v":0.123},{"t":11591,"v":0.124},{"t":11658,"v":0.125},{"t":11762,"v":0.126},{"t":11821,"v":0.127},{"t":12003,"v":0.128},{"t":12428,"v":0.129},{"t":12863,"v":0.13},{"t":12929,"v":0.131},{"t":12975,"v":0.132},{"t":13058,"v":0.133},{"t":13091,"v":0.134},{"t":13124,"v":0.135},{"t":13187,"v":0.136},{"t":13221,"v":0.137},{"t":13262,"v":0.138},{"t":13399,"v":0.139},{"t":20303,"v":0.138},{"t":20415,"v":0.137},{"t":20449,"v":0.136},{"t":20482,"v":0.135},{"t":20532,"v":0.134},{"t":20578,"v":0.133},{"t":20653,"v":0.132},{"t":20782,"v":0.131},{"t":20849,"v":0.13},{"t":20903,"v":0.129},{"t":21037,"v":0.128},{"t":21102,"v":0.127},{"t":21153,"v":0.126},{"t":21216,"v":0.125},{"t":21303,"v":0.124},{"t":21370,"v":0.123},{"t":23000,"v":0.1223},{"t":30000,"v":0}];
            let tracks = [];
            let activeTrack = 0;
            try {
                const saved = JSON.parse(localStorage.getItem(TRACKS_KEY) || "null");
                if (saved && Array.isArray(saved.tracks) && saved.tracks.length > 0) {
                    tracks = saved.tracks;
                    activeTrack = Math.max(0, Math.min(saved.tracks.length - 1, saved.active | 0));
                }
            } catch (e) {}
            if (tracks.length === 0) {
                tracks = [HARDCODED_ENVELOPE.slice()];
                activeTrack = 0;
            }
            let envelope = tracks[activeTrack];
            function saveTracks() {
                try {
                    localStorage.setItem(
                        TRACKS_KEY,
                        JSON.stringify({ active: activeTrack, tracks })
                    );
                } catch (e) {}
            }
            let pmode = localStorage.getItem(PMODE_KEY) || "manual";
            let playing = false;
            let playStart = 0;
            let wasRecording = false;
            function envValueAt(tMs) {
                if (!envelope || envelope.length === 0) return 0;
                if (tMs <= envelope[0].t) return envelope[0].v;
                if (tMs >= envelope[envelope.length - 1].t) return envelope[envelope.length - 1].v;
                let lo = 0, hi = envelope.length - 1;
                while (hi - lo > 1) {
                    const mid = (lo + hi) >> 1;
                    if (envelope[mid].t <= tMs) lo = mid;
                    else hi = mid;
                }
                const a = envelope[lo], b = envelope[hi];
                const f = (tMs - a.t) / (b.t - a.t || 1);
                return a.v + f * (b.v - a.v);
            }
            function computeScale() {
                if (playing && pmode !== "record" && envelope && envelope.length > 0) {
                    return envValueAt(performance.now() - playStart);
                }
                return parseFloat(scaleSlider.value);
            }
            function regenOne(dot) {
                const state = dotStates.get(dot);
                dot.innerHTML = makeBlob(currentSize, state);
            }
            syncCurrent();
            setInterval(() => {
                if (!playing) return;
                const target = parseFloat(slider.value);
                if (currentSize < target) {
                    currentSize = Math.min(currentSize + 1, target);
                } else if (currentSize > target) {
                    currentSize = target;
                }
                syncCurrent();
            }, 1000);
            const FPS_KEY = "mm.fps";
            const fpsSlider = document.getElementById("fps-slider");
            const fpsVal = document.getElementById("fps-val");
            const savedFps = parseFloat(localStorage.getItem(FPS_KEY));
            if (!isNaN(savedFps)) fpsSlider.value = savedFps;
            fpsVal.textContent = fpsSlider.value;
            const dotStates = new Map();
            document.querySelectorAll(".dot").forEach((dot) => {
                dotStates.set(dot, { version: 0 });
                startDotWiggle(dot);
            });
            function startDotWiggle(dot) {
                const state = dotStates.get(dot);
                state.version++;
                const myV = state.version;
                function tick() {
                    if (state.version !== myV) return;
                    regenOne(dot);
                    const min = parseFloat(slider.min);
                    const target = parseFloat(slider.value);
                    let delay;
                    if (currentSize >= target) {
                        const fpsMin = parseFloat(fpsSlider.min);
                        const fpsMax = parseFloat(fpsSlider.value);
                        if (state.fps == null) state.fps = fpsMax;
                        const drift = Math.random() < 0.5 ? -1 : 1;
                        state.fps = Math.max(fpsMin, Math.min(fpsMax, state.fps + drift));
                        delay = 1000 / state.fps;
                    } else {
                        delay = 1000 / 7;
                    }
                    setTimeout(tick, delay);
                }
                tick();
            }
            function setWiggle() {
                document.querySelectorAll(".dot").forEach(startDotWiggle);
            }
            fpsSlider.addEventListener("input", () => {
                fpsVal.textContent = fpsSlider.value;
                setWiggle();
                try {
                    localStorage.setItem(FPS_KEY, fpsSlider.value);
                } catch (e) {}
            });
            slider.addEventListener("input", () => {
                targetVal.textContent = slider.value;
                try {
                    localStorage.setItem(SIZE_KEY, slider.value);
                } catch (e) {}
            });
            const scaleValEl = document.getElementById("scale-val");
            const envInfoEl = document.getElementById("env-info");
            function updateEnvInfo() {
                if (!envelope || envelope.length === 0) {
                    envInfoEl.textContent = "no envelope";
                } else {
                    const dur = (envelope[envelope.length - 1].t / 1000).toFixed(1);
                    envInfoEl.textContent = `${envelope.length} pts · ${dur}s`;
                }
            }
            updateEnvInfo();
            scaleSlider.addEventListener("input", () => {
                scaleValEl.textContent = parseFloat(scaleSlider.value).toFixed(2);
                if (playing && wasRecording) {
                    envelope.push({
                        t: performance.now() - playStart,
                        v: parseFloat(scaleSlider.value),
                    });
                    saveTracks();
                    updateEnvInfo();
                }
            });
            function syncScaleDisplayFromPlayback() {
                if (playing && pmode !== "record" && envelope && envelope.length > 0) {
                    const s = envValueAt(performance.now() - playStart);
                    scaleSlider.value = s;
                    scaleValEl.textContent = s.toFixed(2);
                }
            }
            setInterval(syncScaleDisplayFromPlayback, 50);

            const playBtn = document.getElementById("play-btn");
            const eraseBtn = document.getElementById("erase-btn");
            function setPmode(m) {
                pmode = m;
                document.querySelectorAll("[data-pmode]").forEach((b) => {
                    b.classList.toggle("active", b.dataset.pmode === pmode);
                });
                try { localStorage.setItem(PMODE_KEY, pmode); } catch (e) {}
            }
            setPmode(pmode);
            document.querySelectorAll("[data-pmode]").forEach((b) => {
                b.addEventListener("click", () => setPmode(b.dataset.pmode));
            });

            function startPlay() {
                if (playing) return;
                playing = true;
                playStart = performance.now();
                currentSize = parseFloat(slider.min);
                syncCurrent();
                if (pmode === "record") {
                    tracks[activeTrack] = [
                        { t: 0, v: parseFloat(scaleSlider.value) },
                    ];
                    envelope = tracks[activeTrack];
                    wasRecording = true;
                    saveTracks();
                    updateEnvInfo();
                } else {
                    wasRecording = false;
                }
                console.log("[mania] startPlay", { pmode, wasRecording, envelope });
                playBtn.textContent = "stop";
                playBtn.classList.add("active");
            }
            function stopPlay() {
                if (!playing) return;
                playing = false;
                if (wasRecording && envelope && envelope.length > 0) {
                    saveTracks();
                    console.log("[mania] saved envelope", envelope.length, "pts");
                }
                wasRecording = false;
                updateEnvInfo();
                playBtn.textContent = "play";
                playBtn.classList.remove("active");
            }
            playBtn.addEventListener("click", () => {
                if (playing) stopPlay();
                else startPlay();
            });
            eraseBtn.addEventListener("click", () => {
                tracks[activeTrack] = [];
                envelope = tracks[activeTrack];
                saveTracks();
                updateEnvInfo();
            });
            const copyBtn = document.getElementById("copy-btn");
            copyBtn.addEventListener("click", async () => {
                const text = JSON.stringify(envelope || []);
                try {
                    await navigator.clipboard.writeText(text);
                    const prev = copyBtn.textContent;
                    copyBtn.textContent = "copied!";
                    setTimeout(() => (copyBtn.textContent = prev), 1200);
                } catch (e) {
                    console.log("[mania] envelope JSON:", text);
                    alert("Clipboard blocked — envelope logged to console.");
                }
            });
            const tracksListEl = document.getElementById("tracks-list");
            const addTrackBtn = document.getElementById("add-track-btn");
            const delTrackBtn = document.getElementById("del-track-btn");
            function selectTrack(i) {
                if (i < 0 || i >= tracks.length) return;
                if (playing) stopPlay();
                activeTrack = i;
                envelope = tracks[activeTrack];
                saveTracks();
                renderTracks();
                updateEnvInfo();
            }
            function renderTracks() {
                tracksListEl.innerHTML = "";
                tracks.forEach((trk, i) => {
                    const b = document.createElement("button");
                    b.className = "mode-btn" + (i === activeTrack ? " active" : "");
                    b.textContent = String(i + 1);
                    b.title = `${trk.length} pts`;
                    b.addEventListener("click", () => selectTrack(i));
                    tracksListEl.appendChild(b);
                });
            }
            addTrackBtn.addEventListener("click", () => {
                if (playing) stopPlay();
                tracks.push([]);
                activeTrack = tracks.length - 1;
                envelope = tracks[activeTrack];
                saveTracks();
                renderTracks();
                updateEnvInfo();
            });
            delTrackBtn.addEventListener("click", () => {
                if (tracks.length <= 1) {
                    tracks[0] = [];
                    activeTrack = 0;
                } else {
                    tracks.splice(activeTrack, 1);
                    activeTrack = Math.max(0, activeTrack - 1);
                }
                envelope = tracks[activeTrack];
                saveTracks();
                renderTracks();
                updateEnvInfo();
            });
            renderTracks();

            if (pmode === "autoplay") startPlay();
            document.querySelectorAll(".cat").forEach((btn) => {
                btn.addEventListener("click", () => {
                    document
                        .querySelectorAll(".cat")
                        .forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    const d = data[btn.dataset.id];
                    if (!d) return;
                    titleEl.textContent = d.title;
                    descEl.textContent = d.desc;
                });
            });
        </script>
    </body>
</html>
