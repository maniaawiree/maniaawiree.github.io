                    </li>
                    <li>
                        <button

                            Digital Work</button

                    </li>
                    <li>
                        <button
                            class="cat"
                            data-id="hardware"

                        ><span class="track"

                    <li>
                        <button class="cat" data-id="sound" style="--pos: 88%">

                            ><span class="dot"></span><span class="shelf"></span

                    </li>
                    <li>
                        <button

                            data-id="appearances"

            <section class="detail"></section>
            <div class="modal" id="modal" hidden>
                <button class="modal-close" id="modal-close" aria-label="Close">x</button>
                <div class="modal-content"></div>
            </div>
        </main>

        <div class="size-bar">
            <div class="row">
                <label for="size-slider">target</label>
                <input
                    type="range"
                    id="size-slider"
                    min="10"
                    max="40"
                    step="1"
                    value="40"
                />
                <span class="val" id="size-target-val">10</span>
            </div>
            <div class="row">
                <label for="size-current">current</label>
                <input
                    type="range"
                    id="size-current"
                    min="10"
                    max="40"
                    step="0.01"
                    value="10"
                    disabled
                />
                <span class="val" id="size-current-val">10</span>
            </div>
            <div class="row">
                <label for="fps-slider">fps</label>
                <input
                    type="range"
                    id="fps-slider"
                    min="3"
                    max="7"
                    step="1"
                    value="5"
                />
                <span class="val" id="fps-val">5</span>
            </div>
            <div class="row">
                <label for="scale-slider">scale</label>
                <input
                    type="range"
                    id="scale-slider"
                    min="0"
                    max="1"
                    step="0.001"
                    value="0"
                />
                <span class="val" id="scale-val">0.00</span>
            </div>
            <div class="row">
                <button class="mode-btn" id="play-btn">play</button>
                <button class="mode-btn" data-pmode="autoplay">autoplay</button>
                <button class="mode-btn" data-pmode="manual">manual</button>
                <button class="mode-btn" data-pmode="record">record</button>
                <button class="mode-btn" id="copy-btn">copy</button>
                <button class="mode-btn" id="erase-btn">erase</button>
                <span class="val" id="env-info">no envelope</span>
            </div>
            <div class="row">
                <label>tracks</label>
                <span id="tracks-list"></span>
                <button class="mode-btn" id="add-track-btn">+ new</button>
                <button class="mode-btn" id="del-track-btn">delete</button>
            </div>

            if (!isDebug) {
                document.querySelector(".size-bar").style.display = "none";
            }

                    return { left: r.left.toFixed(1), right: r.right.toFixed(1), width: r.width.toFixed(1) };

                console.log("layout:", rect(layout));
                console.log("modal:", modal.hidden ? "(hidden)" : rect(modal));
                handles.forEach((h, i) =>
                    console.log(`handle[${h.dataset.h}]:`, rect(h))
                );
            };
            setTimeout(() => window.debugPositions(), 200);
            const PLACEHOLDERS = [
                "assets/placeholder1.jpg",
                "assets/placeholder2.png",
                "assets/placeholder3.png",
                "assets/placeholder4.png",
            ];
            function slugify(s) {
                return String(s).toLowerCase().trim().replace(/\s+/g, "-");
            }
            function parseContentTxt(text) {
                return text
                    .split(/^---\s*$/m)
                    .map((chunk) => chunk.trim())
                    .filter(Boolean)
                    .map((chunk) => {
                        const obj = {};
                        let currentKey = "";
                        chunk
                            .trim()
                            .split("\n")
                            .forEach((line) => {
                                const idx = line.indexOf(":");
                                if (idx !== -1) {
                                    const key = line.slice(0, idx).trim();
                                    const val = line.slice(idx + 1).trim();
                                    if (!key) return;
                                    currentKey = key;
                                    obj[key] = val || [];
                                    return;
                                }
                                if (!currentKey) return;
                                if (!Array.isArray(obj[currentKey])) {
                                    obj[currentKey] = [obj[currentKey]];
                                }
                                obj[currentKey].push(line.trim());
                            });
                        return obj;
                    });
            }
            let data = {};
            (async () => {
                try {
                    const res = await fetch("content/content.txt");
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const text = await res.text();
                    const entries = parseContentTxt(text);
                    const works = entries.filter((e) => e.title);
                    const grouped = {};
                    for (const e of works) {
                        const slug = slugify(e.category || "");
                        if (!slug) continue;
                        if (!grouped[slug]) grouped[slug] = [];
                        grouped[slug].push({
                            details: e.details || "",
                            img: e.thumbnail || "",
                            title: e.title || "",
                            desc: e.description || "",
                        });
                    }
                    data = grouped;
                } catch (e) {
                    console.error("[mania] failed to load content.txt", e);
                }
            })();
            const detailEl = document.querySelector(".detail");
            function escapeHTML(s) {
                return String(s).replace(
                    /[&<>"']/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                            "'": "&#39;",
                        })[c],
                );
            }
            function renderProjects(projects) {
                detailEl.innerHTML = projects
                    .map(
                        (p) => `
                            <div class="project" data-details="${escapeHTML(p.details)}">
                                <img src="${escapeHTML(p.img)}" alt="${escapeHTML(p.title)}">
                                <div class="project-text">
                                    <h3>${escapeHTML(p.title)}</h3>
                                    <p>${escapeHTML(p.desc)}</p>
                                </div>
                            </div>
                        `,
                    )
                    .join("");
                detailEl.querySelectorAll(".project").forEach((el) => {
                    el.addEventListener("click", () =>
                        openModal(el.dataset.details),
                    );
                });
            }
            const modalEl = document.getElementById("modal");
            const modalContentEl = modalEl.querySelector(".modal-content");
            const modalCloseBtn = document.getElementById("modal-close");
            const MODAL_BORDER_INSET = 4;
            function visibleHandleX(handle) {
                const r = handle.getBoundingClientRect();
                return r.left + r.width / 2;
            }
            function updateModalPosition() {
                const h1 = document.querySelector('.handle[data-h="1"]');
                const h3 = document.querySelector('.handle[data-h="3"]');
                if (!h1 || !h3) return;
                const layoutRect = layout.getBoundingClientRect();
                const left =
                    visibleHandleX(h1) - layoutRect.left + MODAL_BORDER_INSET;
                const right =
                    visibleHandleX(h3) - layoutRect.left - MODAL_BORDER_INSET;
                modalEl.style.setProperty("--modal-left", `${left.toFixed(2)}px`);
                modalEl.style.setProperty(
                    "--modal-width",
                    `${Math.max(0, right - left).toFixed(2)}px`,
                );
            }
            function updateModalScrollSpace() {
                if (modalEl.hidden) {
                    layout.style.minHeight = "";
                    return;
                }
                const viewportSpace =
                    window.innerHeight - layout.getBoundingClientRect().top;
                layout.style.minHeight = `${Math.max(
                    viewportSpace,
                    modalEl.offsetHeight,
                )}px`;
            }
            function watchModalImageLoads() {
                modalContentEl.querySelectorAll("img").forEach((img) => {
                    if (img.complete) return;
                    img.addEventListener("load", updateModalScrollSpace, {
                        once: true,
                    });
                    img.addEventListener("error", updateModalScrollSpace, {
                        once: true,
                    });
                });
            }
            function nextFrame() {
                return new Promise((resolve) => requestAnimationFrame(resolve));
            }
            async function openModal(detailsPath) {
                if (!detailsPath) return;
                modalContentEl.style.opacity = "0";
                try {
                    const res = await fetch(detailsPath);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const html = await res.text();
                    modalContentEl.innerHTML = html;
                    watchModalImageLoads();
                } catch (e) {
                    modalContentEl.innerHTML = "<p>page missing</p>";
                    console.error("[mania] failed to load page", detailsPath, e);
                }
                updateModalPosition();
                modalEl.hidden = false;
                await nextFrame();
                await nextFrame();
                updateModalScrollSpace();
                modalContentEl.style.opacity = "1";
            }
            function closeModal() {
                modalEl.hidden = true;
                modalContentEl.innerHTML = "";
                updateModalScrollSpace();
            }
            modalCloseBtn.addEventListener("click", closeModal);
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && !modalEl.hidden) closeModal();
            });
            const layout = document.querySelector(".layout");
            window.addEventListener("resize", () => {
                updateModalPosition();
                updateModalScrollSpace();
            });
            const STORAGE_KEY = "mm.cols";
            try {
                const saved = JSON.parse(
                    localStorage.getItem(STORAGE_KEY) || "null",

                if (saved) {
                    if (typeof saved.c1 === "number")
                        layout.style.setProperty("--c1", saved.c1);
                    if (typeof saved.c2 === "number")
                        layout.style.setProperty("--c2", saved.c2);
                    if (typeof saved.c3 === "number")
                        layout.style.setProperty("--c3", saved.c3);
                }
            } catch (e) {}
            const colKey = (which) => `--c${which}`;
            let drag = null;
            document.querySelectorAll(".handle").forEach((h) => {
                h.addEventListener("mousedown", (e) => {
                    const styles = getComputedStyle(layout);
                    drag = {
                        which: h.dataset.h,
                        startX: e.clientX,
                        startVal: parseFloat(
                            styles.getPropertyValue(colKey(h.dataset.h)),
                        ),
                        total: layout.offsetWidth,
                    };
                    document.body.style.cursor = "col-resize";
                    document.body.style.userSelect = "none";
                    e.preventDefault();
                });
            });
            document.addEventListener("mousemove", (e) => {
                if (!drag) return;
                const dxPct = ((e.clientX - drag.startX) / drag.total) * 100;
                const v = Math.min(70, Math.max(5, drag.startVal + dxPct));
                layout.style.setProperty(colKey(drag.which), v);
                updateModalPosition();
            });
            document.addEventListener("mouseup", () => {
                if (!drag) return;
                drag = null;
                document.body.style.cursor = "";
                document.body.style.userSelect = "";

                const c1 = parseFloat(styles.getPropertyValue("--c1"));
                const c2 = parseFloat(styles.getPropertyValue("--c2"));
                const c3 = parseFloat(styles.getPropertyValue("--c3"));
                try {
                    localStorage.setItem(
                        STORAGE_KEY,
                        JSON.stringify({ c1, c2, c3 }),

            function makeBlob(baseR, state) {
                const stroke = 1.5;
                const pointsCount = 5 + Math.floor(Math.random() * 5);
                const startAngle = Math.random() * Math.PI * 2;
                const rotRad = ((Math.random() * 30 - 15) * Math.PI) / 180;
                const baseJitter = 0.4;
                const refR = 10;
                const s = computeScale();
                const scaleFactor = 1 - s + s * (refR / baseR);
                const jitter = Math.min(baseJitter, baseJitter * scaleFactor);
                const radii = Array.from(
                    { length: pointsCount },
                    () => baseR * (1 - jitter + Math.random() * jitter * 2),
                );
                const cosR = Math.cos(rotRad),
                    sinR = Math.sin(rotRad);
                const pts = [];
                for (let i = 0; i < pointsCount; i++) {
                    const a = startAngle + (i / pointsCount) * Math.PI * 2;
                    const r = radii[i];
                    const x0 = Math.cos(a) * r;
                    const y0 = Math.sin(a) * r;
                    pts.push([x0 * cosR - y0 * sinR, x0 * sinR + y0 * cosR]);
                }
                const n = pts.length;
                const ctrl = [];
                for (let i = 0; i < n; i++) {
                    const p0 = pts[(i - 1 + n) % n];
                    const p1 = pts[i];
                    const p2 = pts[(i + 1) % n];
                    const p3 = pts[(i + 2) % n];
                    ctrl.push([
                        [
                            p1[0] + (p2[0] - p0[0]) / 6,
                            p1[1] + (p2[1] - p0[1]) / 6,
                        ],
                        [
                            p2[0] - (p3[0] - p1[0]) / 6,
                            p2[1] - (p3[1] - p1[1]) / 6,
                        ],
                    ]);
                }
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                for (let i = 0; i < n; i++) {
                    const p1 = pts[i];
                    const p2 = pts[(i + 1) % n];
                    const [c1, c2] = ctrl[i];
                    for (let t = 0; t <= 24; t++) {
                        const u = t / 24,
                            mu = 1 - u;
                        const x =
                            mu * mu * mu * p1[0] +
                            3 * mu * mu * u * c1[0] +
                            3 * mu * u * u * c2[0] +
                            u * u * u * p2[0];
                        const y =
                            mu * mu * mu * p1[1] +
                            3 * mu * mu * u * c1[1] +
                            3 * mu * u * u * c2[1] +
                            u * u * u * p2[1];
                        if (x < minX) minX = x;
                        if (y < minY) minY = y;
                        if (x > maxX) maxX = x;
                        if (y > maxY) maxY = y;
                    }
                }
                const pad = stroke / 2 + 0.5;
                minX -= pad;
                minY -= pad;
                maxX += pad;
                maxY += pad;
                const w = maxX - minX,
                    h = maxY - minY;
                const offX = -minX,
                    offY = -minY;
                let d = `M ${(pts[0][0] + offX).toFixed(2)} ${(pts[0][1] + offY).toFixed(2)}`;
                for (let i = 0; i < n; i++) {
                    const p2 = pts[(i + 1) % n];
                    const [c1, c2] = ctrl[i];
                    d += ` C ${(c1[0] + offX).toFixed(2)} ${(c1[1] + offY).toFixed(2)}, ${(c2[0] + offX).toFixed(2)} ${(c2[1] + offY).toFixed(2)}, ${(p2[0] + offX).toFixed(2)} ${(p2[1] + offY).toFixed(2)}`;
                }
                d += " Z";
                return `<svg width="${w.toFixed(2)}" height="${h.toFixed(2)}" viewBox="0 0 ${w.toFixed(2)} ${h.toFixed(2)}" style="display:block" xmlns="http://www.w3.org/2000/svg"><path d="${d}" fill="#ff2400" stroke="black" stroke-width="${stroke}" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
            }

                { t: 21303, v: 0.124 },
                { t: 21370, v: 0.123 },
                { t: 23000, v: 0.1223 },
                { t: 30000, v: 0 },
            ];
            let tracks = [];
            let activeTrack = 0;
            if (isDebug) {
                try {
                    const saved = JSON.parse(
                        localStorage.getItem(TRACKS_KEY) || "null",
                    );
                    if (
                        saved &&
                        Array.isArray(saved.tracks) &&
                        saved.tracks.length > 0
                    ) {
                        tracks = saved.tracks;
                        activeTrack = Math.max(
                            0,
                            Math.min(saved.tracks.length - 1, saved.active | 0),
                        );
                    }
                } catch (e) {}
            }
            if (tracks.length === 0) {
                tracks = [HARDCODED_ENVELOPE.slice()];
                activeTrack = 0;
            }
            let envelope = tracks[activeTrack];
            function saveTracks() {
                if (!isDebug) return;
                try {
                    localStorage.setItem(
                        TRACKS_KEY,
                        JSON.stringify({ active: activeTrack, tracks }),
                    );
                } catch (e) {}
            }
            let pmode = isDebug
                ? localStorage.getItem(PMODE_KEY) || "manual"
                : "autoplay";
            let playing = false;
            let playStart = 0;
            let wasRecording = false;
            function envValueAt(tMs) {
                if (!envelope || envelope.length === 0) return 0;
                if (tMs <= envelope[0].t) return envelope[0].v;
                if (tMs >= envelope[envelope.length - 1].t)
                    return envelope[envelope.length - 1].v;
                let lo = 0,
                    hi = envelope.length - 1;
                while (hi - lo > 1) {
                    const mid = (lo + hi) >> 1;
                    if (envelope[mid].t <= tMs) lo = mid;
                    else hi = mid;
                }
                const a = envelope[lo],
                    b = envelope[hi];
                const f = (tMs - a.t) / (b.t - a.t || 1);
                return a.v + f * (b.v - a.v);
            }
            function computeScale() {
                if (
                    playing &&
                    pmode !== "record" &&
                    envelope &&
                    envelope.length > 0
                ) {
                    return envValueAt(performance.now() - playStart);
                }
                return parseFloat(scaleSlider.value);
            }
            function regenOne(dot) {
                const state = dotStates.get(dot);
                dot.innerHTML = makeBlob(currentSize, state);
            }
            syncCurrent();
            setInterval(() => {
                if (!playing) return;
                const target = parseFloat(slider.value);
                if (currentSize < target) {
                    currentSize = Math.min(currentSize + 1, target);
                } else if (currentSize > target) {
                    currentSize = target;
                }
                syncCurrent();
            }, 1000);
            const FPS_KEY = "mm.fps";
            const fpsSlider = document.getElementById("fps-slider");
            const fpsVal = document.getElementById("fps-val");
            if (isDebug) {
                const savedFps = parseFloat(localStorage.getItem(FPS_KEY));
                if (!isNaN(savedFps)) fpsSlider.value = savedFps;
            }
            fpsVal.textContent = fpsSlider.value;
            const dotStates = new Map();
            document.querySelectorAll(".dot").forEach((dot) => {
                dotStates.set(dot, { version: 0 });
                startDotWiggle(dot);
            });
            function startDotWiggle(dot) {
                const state = dotStates.get(dot);
                state.version++;
                const myV = state.version;
                function tick() {
                    if (state.version !== myV) return;
                    regenOne(dot);
                    const min = parseFloat(slider.min);
                    const target = parseFloat(slider.value);
                    let delay;
                    if (currentSize >= target) {
                        const fpsMin = parseFloat(fpsSlider.min);
                        const fpsMax = parseFloat(fpsSlider.value);
                        if (state.fps == null) state.fps = fpsMax;
                        const drift = Math.random() < 0.5 ? -1 : 1;
                        state.fps = Math.max(
                            fpsMin,
                            Math.min(fpsMax, state.fps + drift),
                        );
                        delay = 1000 / state.fps;
                    } else {
                        delay = 1000 / 7;
                    }
                    setTimeout(tick, delay);
                }
                tick();
            }
            function setWiggle() {
                document.querySelectorAll(".dot").forEach(startDotWiggle);
            }
            fpsSlider.addEventListener("input", () => {
                fpsVal.textContent = fpsSlider.value;
                setWiggle();
                try {
                    localStorage.setItem(FPS_KEY, fpsSlider.value);
                } catch (e) {}
            });
            slider.addEventListener("input", () => {
                targetVal.textContent = slider.value;
                try {
                    localStorage.setItem(SIZE_KEY, slider.value);
                } catch (e) {}
            });
            const scaleValEl = document.getElementById("scale-val");
            const envInfoEl = document.getElementById("env-info");
            function updateEnvInfo() {
                if (!envelope || envelope.length === 0) {
                    envInfoEl.textContent = "no envelope";
                } else {
                    const dur = (
                        envelope[envelope.length - 1].t / 1000
                    ).toFixed(1);
                    envInfoEl.textContent = `${envelope.length} pts · ${dur}s`;
                }
            }
            updateEnvInfo();
            scaleSlider.addEventListener("input", () => {
                scaleValEl.textContent = parseFloat(scaleSlider.value).toFixed(
                    2,
                );
                if (playing && wasRecording) {
                    envelope.push({
                        t: performance.now() - playStart,
                        v: parseFloat(scaleSlider.value),
                    });
                    saveTracks();
                    updateEnvInfo();
                }
            });
            function syncScaleDisplayFromPlayback() {
                if (
                    playing &&
                    pmode !== "record" &&
                    envelope &&
                    envelope.length > 0
                ) {
                    const s = envValueAt(performance.now() - playStart);
                    scaleSlider.value = s;
                    scaleValEl.textContent = s.toFixed(2);
                }
            }
            setInterval(syncScaleDisplayFromPlayback, 50);

            const playBtn = document.getElementById("play-btn");
            const eraseBtn = document.getElementById("erase-btn");
            function setPmode(m) {
                pmode = m;
                document.querySelectorAll("[data-pmode]").forEach((b) => {
                    b.classList.toggle("active", b.dataset.pmode === pmode);
                });
                if (!isDebug) return;
                try {
                    localStorage.setItem(PMODE_KEY, pmode);
                } catch (e) {}
            }
            setPmode(pmode);
            document.querySelectorAll("[data-pmode]").forEach((b) => {
                b.addEventListener("click", () => setPmode(b.dataset.pmode));
            });

            function startPlay() {
                if (playing) return;
                playing = true;
                playStart = performance.now();
                currentSize = parseFloat(slider.min);
                syncCurrent();
                if (pmode === "record") {
                    tracks[activeTrack] = [
                        { t: 0, v: parseFloat(scaleSlider.value) },
                    ];
                    envelope = tracks[activeTrack];
                    wasRecording = true;
                    saveTracks();
                    updateEnvInfo();
                } else {
                    wasRecording = false;
                }
                console.log("[mania] startPlay", {
                    pmode,
                    wasRecording,
                    envelope,
                });
                playBtn.textContent = "stop";
                playBtn.classList.add("active");
            }
            function stopPlay() {
                if (!playing) return;
                playing = false;
                if (wasRecording && envelope && envelope.length > 0) {
                    saveTracks();
                    console.log(
                        "[mania] saved envelope",
                        envelope.length,
                        "pts",
                    );
                }
                wasRecording = false;
                updateEnvInfo();
                playBtn.textContent = "play";
                playBtn.classList.remove("active");
            }
            playBtn.addEventListener("click", () => {
                if (playing) stopPlay();
                else startPlay();
            });
            eraseBtn.addEventListener("click", () => {
                tracks[activeTrack] = [];
                envelope = tracks[activeTrack];
                saveTracks();
                updateEnvInfo();
            });
            const copyBtn = document.getElementById("copy-btn");
            copyBtn.addEventListener("click", async () => {
                const text = JSON.stringify(envelope || []);
                try {
                    await navigator.clipboard.writeText(text);
                    const prev = copyBtn.textContent;
                    copyBtn.textContent = "copied!";
                    setTimeout(() => (copyBtn.textContent = prev), 1200);
                } catch (e) {
                    console.log("[mania] envelope JSON:", text);
                    alert("Clipboard blocked — envelope logged to console.");
                }
            });
            const tracksListEl = document.getElementById("tracks-list");
            const addTrackBtn = document.getElementById("add-track-btn");
            const delTrackBtn = document.getElementById("del-track-btn");
            function selectTrack(i) {
                if (i < 0 || i >= tracks.length) return;
                if (playing) stopPlay();
                activeTrack = i;
                envelope = tracks[activeTrack];
                saveTracks();
                renderTracks();
                updateEnvInfo();
            }
            function renderTracks() {
                tracksListEl.innerHTML = "";
                tracks.forEach((trk, i) => {
                    const b = document.createElement("button");
                    b.className =
                        "mode-btn" + (i === activeTrack ? " active" : "");
                    b.textContent = String(i + 1);
                    b.title = `${trk.length} pts`;
                    b.addEventListener("click", () => selectTrack(i));
                    tracksListEl.appendChild(b);
                });
            }
            addTrackBtn.addEventListener("click", () => {
                if (playing) stopPlay();
                tracks.push([]);
                activeTrack = tracks.length - 1;
                envelope = tracks[activeTrack];
                saveTracks();
                renderTracks();
                updateEnvInfo();
            });
            delTrackBtn.addEventListener("click", () => {
                if (tracks.length <= 1) {
                    tracks[0] = [];
                    activeTrack = 0;
                } else {
                    tracks.splice(activeTrack, 1);
                    activeTrack = Math.max(0, activeTrack - 1);
                }
                envelope = tracks[activeTrack];
                saveTracks();
                renderTracks();
                updateEnvInfo();
            });
            renderTracks();

            if (pmode === "autoplay") startPlay();
            let dotsCollapsed = false;
            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }
            function collapseDots() {
                if (dotsCollapsed) return;
                dotsCollapsed = true;
                document.querySelectorAll(".categories li").forEach((li) => {
                    const track = li.querySelector(".track");
                    if (!track) return;
                    const trackWidth = track.offsetWidth;
                    const curStr = li.style.getPropertyValue("--pos") || "";
                    let curPx;
                    if (curStr.endsWith("%")) {
                        curPx = (parseFloat(curStr) / 100) * trackWidth;
                    } else if (curStr.endsWith("px")) {
                        curPx = parseFloat(curStr);
                    } else {
                        curPx = trackWidth * 0.5;
                    }
                    const targetPx = -90 + Math.random() * 20;
                    const duration = 600 + Math.random() * 200;
                    const startTime = performance.now();
                    function tick(now) {
                        const elapsed = now - startTime;
                        const t = Math.min(1, elapsed / duration);
                        const eased = easeOutCubic(t);
                        const px = curPx + (targetPx - curPx) * eased;
                        li.style.setProperty("--pos", `${px.toFixed(2)}px`);
                        if (t < 1) requestAnimationFrame(tick);
                    }
                    requestAnimationFrame(tick);
                });
            }
            function fallClickedBlob(btn) {
                const li = btn.closest("li");
                const dot = li?.querySelector(".dot");
                if (!li || !dot || li.dataset.fallen === "true") return;
                li.dataset.fallen = "true";
                const fallStr = li.style.getPropertyValue("--fall") || "";
                const curFall = fallStr.endsWith("px")
                    ? parseFloat(fallStr)
                    : 0;
                const dotRect = dot.getBoundingClientRect();
                const dotBottom = dotRect.bottom + window.scrollY;
                const pageBottom = Math.max(
                    document.body.scrollHeight,
                    document.documentElement.scrollHeight,
                );
                const targetFall = Math.max(0, pageBottom - dotBottom - 8);
                let fall = curFall;
                let velocity = -0.08 - Math.random() * 0.03;
                const gravity = 0.00115;
                const terminalVelocity = 1.15 + Math.random() * 0.15;
                let lastTime = performance.now();
                function tick(now) {
                    const dt = Math.min(32, now - lastTime);
                    lastTime = now;
                    velocity = Math.min(
                        terminalVelocity,
                        velocity + gravity * dt,
                    );
                    fall += velocity * dt;
                    if (fall >= targetFall) {
                        fall = targetFall;
                    }
                    li.style.setProperty("--fall", `${fall.toFixed(2)}px`);
                    if (fall < targetFall) requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
            }
            document.querySelectorAll(".cat").forEach((btn) => {
                btn.addEventListener("click", () => {
                    document
                        .querySelectorAll(".cat")
                        .forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    const projects = data[btn.dataset.id];
                    if (projects) renderProjects(projects);
                    collapseDots();
                    fallClickedBlob(btn);
                });
            });
        </script>
    </body>
</html>
